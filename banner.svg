      <stop offset="35%" stop-color="#b8e8e8"/>
      <stop offset="50%" stop-color="#eaf6f6"/>
      <stop offset="65%" stop-color="#b8e8e8"/>
      <stop offset="100%" stop-color="#7ecece"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
