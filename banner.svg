      <stop offset="0%" stop-color="#0a1f1f"/>
      <stop offset="40%" stop-color="#0d2e2e"/>
      <stop offset="100%" stop-color="#071818"/>
    </linearGradient>
    <linearGradient id="wave1g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a4a4a" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#2a7a7a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1a4a4a" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a8d8d8" stop-opacity="0"/>
      <stop offset="40%" stop-color="#d4eeee" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#eaf6f6" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#d4eeee" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a8d8d8" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="3s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="textgrad" x1="0%" y1="0%" x2="100%" y2="0%">
